<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
        <!-- Tab tittle -->
        <title>Google</title>
        <!-- Import CSS file -->
        <link rel="stylesheet" href="style.css">
        <!-- Google tab icon-->
        <link rel="tab icon" type="image/x-icon" href="images/favicon.ico">
        <!-- Import font -->
        <script src="https://kit.fontawesome.com/4c536a6bd5.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <!-- Upper side -->
        <nav class="nav">
            <a class="nav-link" href="https://mail.google.com/mail/">Gmail</a>
            <a class="nav-link" href="https://www.google.com.br/imghp">Images</a>
            <svg class="dots" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#5F6368">
                <a href="https://www.google.com.br/intl/en/about/products" target="_blank">
                    <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path></a>
            </svg>
            <a href="https://accounts.google.com/ServiceLogin" target="_blank"><button class="button-sign-in">Sign In</button></a>
        </nav>
        <!-- Middle part -->
        <main class="main">
            <!-- Logo -->
            <img class="logo" src="images/google-logo.png" alt="">
            <!-- Searchbar -->
            <div class="searchbar">
                <img class="search-icon" src="images/google-search.png" alt="">
                <input class="search-input" type="text">
                <!-- Microphone button -->
                <button>
                    <img class="microphone-icon" src="images/google-microphone.png" alt="">
                </button>
            </div>
            <!-- Search button and feeling lucky button -->
            <div class="search-buttons">
                <a href="" target="_blank"><button class="button-search">Google Search</button></a>
                <a href="https://www.google.com/doodles" target="_blank"><button class="button-search">I'm Feeling Lucky</button></a>
            </div>
        </main>
        <!-- Footer part -->
        <footer class="footer">
            <!-- Links and text for each category -->
            <div class="left-section">
                <a class="footer-link" href="https://about.google/?utm_source=google-BR&utm_medium=referral&utm_campaign=hp-footer&fg=1">About</a>
                <a class="footer-link" href="https://www.google.com/intl/en_br/ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Advertising</a>
                <a class="footer-link" href="https://www.google.com/services/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Business</a>
                <a class="footer-link" href="https://google.com/search/howsearchworks/?fg=1">How Search works</a>
            </div>
            <div class="right-section">
                <a class="footer-link" href="https://policies.google.com/privacy?hl=en-BR&fg=1">Privacy</a>
                <a class="footer-link" href="https://policies.google.com/terms?hl=en-BR&fg=1">Terms</a>
                <a class="footer-link" href="#">Settings</a>
            </div>
        </footer>
    </body>
</html>
